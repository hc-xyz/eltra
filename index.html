<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Eltra | Minimalistic fartlek run timer</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
	<style>
		/* --- SETUP & BASIC STUFF --- */

:root {
  /* Spacing */
  --space_0: 0.25rem;
  --space_1: 0.5rem;
  --space_2: 1rem;
  --space_4: 2rem;
  --space_8: 4rem;
  --space_16: 8rem;

  /* Colors */
  --color-light_main: #fff;
  --color-light_text: #000;
  --color-light_bg-1: #F9DBBD;
  --color-light_bg-2: #E0F6F5;
  --color-dark_main: #000;
  --color-dark_text: #fff;
  --color-dark_bg-1: #6C3B09;
  --color-dark_bg-2: #8A8A8A;
  --color-accent1: #C96D12;
  --color-accent2: #12C9C9;
  
  /* Font Sizes & Line Heights */
  --font-size_tiny: 1rem;
  --font-size_p: 1.5rem;
  --font-size_h1: 3rem;
}

* {
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  
  margin: 0;
  padding: 0;
  border: 0;
  font: inherit;
  vertical-align: baseline;
}

body{
	width: 100vw;
	height: 100vw;
	overflow: hidden;
	background-color: var(--color-light_main);
}

/* --- HEADER --- */

.header{
	position: fixed;
	display:flex;
	width: 100%;
	flex-direction: row;
	justify-content: space-between;
	align-items: center;
	padding: var(--space_1);
	background-color: var(--color-light_bg-1);
	color: var(--color-light_text);
	font-size: var(--font-size_p);
}

.header-icontainer{
	display: flex;
	width: 3.5em;
	align-items: center;
	justify-content: space-around;
}

.header-appname{
  font-family: "Oswald", sans-serif;
  letter-spacing: auto;
  font-optical-sizing: auto;
  font-weight: 300;
  font-style: normal;
  transition: 0.05s ease-in-out;
}

.header-appname:hover{
	font-weight: 700;
	letter-spacing: 0.05em;
}

.header-helpBtn{
	height: 1em;
}

.greeting{
	background-color: var(--color-light_bg-1);
	color: var(--color-light_text);
	font-size: var(--font-size_h1);
}

/* --- MAIN FORM --- */

.main-form{
	padding-top: 4rem;
	background-color: var(--color-light_bg-2);
	font-family: "Rubik", sans-serif;
	font-optical-sizing: auto;
    font-weight: 500;
    font-style: normal;
    line-height: 5em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.main-form > label{
	font-size: 2rem;
}

.main-form input[type="number"]{
	font-family: "Montserrat", sans-serif;
	background: none;
    font-optical-sizing: auto;
    font-weight: 200;
    font-style: normal;
    font-size: 4rem;
    text-align: center;
}

/* For WebKit browsers (Chrome, Safari) */
.main-form input[type="number"]::-webkit-inner-spin-button,
.main-form input[type="number"]::-webkit-outer-spin-button{
    -webkit-appearance: none;
    margin: 0;
}
 
/* For Firefox */
input[type="number"] {
    -moz-appearance: textfield;
}

.main-form input[type="range"]{
  -webkit-appearance: none;
  width: 18rem;
  background: transparent;
  cursor: pointer;
}

/* --- Webkit Browsers --- */
.main-form input[type="range"]::-webkit-slider-runnable-track{
  height: 2px;
  background: var(--color-light_text);
}

.main-form input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance: none;
  height: 0.5rem;
  width: 0.5rem;
  background: var(--color-light_text);
  margin-top: -0.5rem;
}

/* --- Firefox --- */
.main-form input[type="range"]::-moz-range-track{
  height: 2px;
  background: var(--color-light_text);
  border-radius: 0px;
}

.main-form input[type="range"]::-moz-range-thumb{
  height: 0.5rem;
  width: 0.5rem;
  background: var(--color-light_text);
  transition: 0.05s ease;
}

	</style>
  </head>
  <body id="screen">
	<div class="header">
		<h3 class="header-appname">Eltra v1.0</h3>
		<span class="header-icontainer">
			<img class="header-helpBtn" id="infoBtn" src="https://upload.wikimedia.org/wikipedia/commons/2/20/Information-icon.svg" alt="Information" />
			<img class="header-helpBtn" id="aboutBtn" src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Gear_8.svg" alt="Settings" />
		</span>
	</div>
	<div class="greeting">
		<!--CONSIDER FOR FUTURE USE IF NECESSARY-->
	</div>
	<form class="main-form" id="main" action="#" method="POST">
		<label for="surgeCount">Number of surges:</label><input type="number" id="surgeCount" name="surgeCount" min="10" max="100" />
		<div></span><input type="checkbox" id="infSurges" name="infSurges" /><label for="scales">I want unlimited surges</label></div>
		<label for="surgeNum">Time for each surge:</label><input type="number" id="surgeNum" name="surgeNum" min="10" max="100" />
		<input type="range" id="surgeRange" name="surgeRange" min="10" max="100" /><label for="recoNum">Recovery period:</label>
		<input type="number" id="recoNum" name="recoNum" min="10" max="100" /><input type="range" id="recoRange" name="recoRange" min="10" max="100" />
		<button type="submit">Submit</button>
	</form>
	<script>
		const surgeNum = document.getElementById('surgeNum');
		const surgeRange = document.getElementById('surgeRange');
		const recoNum = document.getElementById('recoNum');
		const recoRange = document.getElementById('recoRange');

		function syncInputs(e) {
			let val = e.currentTarget.value;
			switch (e.currentTarget.id) {
				case 'surgeNum':
					surgeRange.value = val;
					break;
				case 'surgeRange':
					surgeNum.value = val;
					break;
				case 'recoNum':
					recoRange.value = val;
					break;
				case 'recoRange':
					recoNum.value = val;
					break;
			}
		}

		surgeNum.addEventListener('input', syncInputs);
		surgeRange.addEventListener('input', syncInputs);
		recoNum.addEventListener('input', syncInputs);
		recoRange.addEventListener('input', syncInputs);
	</script>
  </body>
</html>
