<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Eltra | Minimalistic fartlek run timer</title>
    <!--<link rel="stylesheet" href="style-base.css" />-->
    <style>
      :root {
  /* Spacing */
  --space_0: 0.25rem; /* 4px   - utility to substitute 0 margins */
  --space_1: 0.5rem;   /* 8px   - utility for tight paddings etc */
  --space_2: 1rem;     /* 16px  - 1/2 line height, for closely related elements */
  --space_4: 2rem;     /* 32px  - 1 line height, for related elements */
  --space_8: 4rem;     /* 64px  - 2 line heights, for loosely related elements */
  --space_16: 8rem;    /* 128px - 4 line heights, for unrelated elements */

  /* Colors */
  --color-light_main: #fff;
  --color-light_text: #000;
  --color-light_bg-subtle: #D9D9D9;
  --color-light_bg-emphasis: #474747;
  --color-dark_main: #000;
  --color-dark_text: #fff;
  --color-dark_bg-subtle: #2E2E2E;
  --color-dark_bg-emphasis: #8A8A8A;
  --color-accent1: #C96D12;
  --color-accent2: #12C9C9;

  /* Font Families */
  --font_main: system-ui, sans-serif;
  --font_heading-1: inherit;
  --font_heading-2: ;

  /* Font Sizes & Line Heights */
  --font-size_tiny: 1rem;
  --font-size_p: 1.5rem;
  --font-size_h1: 3rem;
}

* {
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  
  margin: 0;
  padding: 0;
  border: 0;
  font: inherit;
  vertical-align: baseline;
}

body{
	width: 100vw;
	height: 100vw;
	overflow: hidden;
	background-color: var(--color-light_main);
}
.header{
	display: flex;
	width: 100%;
	flex-direction: row;
	justify-content: space-between;
	padding: var(--space_1);
	background-color: var(--color-light_bg-emphasis);
	color: var(--color-light_main);
	font-size: var(--font-size_p);
}
.greeting{
	background-color: var(--color-light_bg-subtle);
	color: var(--color-light_text);
	font-size: var(--font-size_h1);
}

.greeting a{
	font-size: var(--font-size_tiny);
}

.main-form{
}

    </style>
  </head>
  <body id="screen">
	<div class="header">
		<h3>Eltra v1.0</h3>
		<h3 id="settings">Gear symbol</h3>
	</div>
	<div class="greeting">
		<h1>Good morning, User!</h1>
		<a href="#" id="nameSet">Psst... Set your name here!</a>
	</div>
	<div class="main-form">
		<form id="main" action="#" method="POST">
			<label for="surgeCount">Number of surges:</label>
			<input type="number" id="surgeCount" name="surgeCount" min="10" max="100" />
			<input type="checkbox" id="infSurges" name="infSurges" />
			<label for="scales">I want unlimited surges</label>
			<label for="surgeNum">Time for each surge:</label>
			<input type="number" id="surgeNum" name="surgeNum" min="10" max="100" />
			<input type="range" id="surgeRange" name="surgeRange" min="10" max="100" />
			<label for="recoNum">Recovery period:</label>
			<input type="number" id="recoNum" name="recoNum" min="10" max="100" />
			<input type="range" id="recoRange" name="recoRange" min="10" max="100" />
			<button type="submit">Submit</button>
		</form>
	</div>
	<div class="footer">
		
	</div>
	<script>
		const surgeNum = document.getElementById('surgeNum');
		const surgeRange = document.getElementById('surgeRange');
		const recoNum = document.getElementById('recoNum');
		const recoRange = document.getElementById('recoRange');

		function syncInputs(e) {
			let val = e.currentTarget.value;
			switch (e.currentTarget.id) {
				case 'surgeNum':
					surgeRange.value = val;
					break;
				case 'surgeRange':
					surgeNum.value = val;
					break;
				case 'recoNum':
					recoRange.value = val;
					break;
				case 'recoRange':
					recoNum.value = val;
					break;
			}
		}

		surgeNum.addEventListener('input', syncInputs);
		surgeRange.addEventListener('input', syncInputs);
		recoNum.addEventListener('input', syncInputs);
		recoRange.addEventListener('input', syncInputs);
	</script>
  </body>
</html>
